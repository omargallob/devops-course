# Air configuration for Go hot reload.
# https://github.com/air-verse/air

root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/server"
  cmd = "go build -o ./tmp/server ./cmd/server"
  delay = 1000
  exclude_dir = ["apps", "bazel", "infra", "node_modules", "tmp", "tools"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go", "mod", "sum"]
  kill_delay = 500
  send_interrupt = true
  stop_on_error = true

[log]
  time = false

[misc]
  clean_on_exit = true
