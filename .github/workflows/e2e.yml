name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  e2e:
    name: Cypress E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - uses: pnpm/action-setup@v5

      - name: Install dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm --filter @devops-course/web build

      - name: Start Go backend
        run: go run ./cmd/server &
        env:
          PORT: "8080"

      - name: Start Astro preview server
        run: |
          cd apps/web && pnpm preview --port 4321 &
          # Wait for both servers to be ready
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/healthz > /dev/null 2>&1 && break
            sleep 1
          done
          for i in $(seq 1 30); do
            curl -sf http://localhost:4321/ > /dev/null 2>&1 && break
            sleep 1
          done

      - name: Run Cypress tests
        run: pnpm --filter @devops-course/e2e test
        env:
          CYPRESS_API_URL: http://localhost:8080

      - name: Upload Cypress screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: e2e/cypress/screenshots/
          retention-days: 7
