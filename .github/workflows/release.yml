name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  build-and-push-images:
    name: Build & Push Container Images
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: bazel-contrib/setup-bazel@0.14.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-image
          repository-cache: true

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - uses: pnpm/action-setup@v5

      - name: Install frontend deps
        run: pnpm install

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          bazel run //cmd/server:push --config=ci \
            -- --tag "v${VERSION}" --tag "latest"

      - name: Build and push web image
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          bazel run //apps/web:push --config=ci \
            -- --tag "v${VERSION}" --tag "latest"

  update-release-notes:
    name: Add Image References to Release
    needs: [release-please, build-and-push-images]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Append container image info to release body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.release-please.outputs.version }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.repository }}"
          SERVER_IMAGE="ghcr.io/${OWNER}/devops-course-server:v${VERSION}"
          WEB_IMAGE="ghcr.io/${OWNER}/devops-course-web:v${VERSION}"

          EXISTING_BODY=$(gh release view "${TAG_NAME}" --repo "${REPO}" --json body -q .body)

          IMAGES_SECTION="
          ---

          ## Container Images

          | Image | Pull Command |
          |-------|-------------|
          | Server | \`docker pull ${SERVER_IMAGE}\` |
          | Web | \`docker pull ${WEB_IMAGE}\` |"

          gh release edit "${TAG_NAME}" \
            --repo "${REPO}" \
            --notes "${EXISTING_BODY}${IMAGES_SECTION}"
