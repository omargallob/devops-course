name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - uses: pnpm/action-setup@v5

      - name: Install frontend deps
        run: pnpm install

      - name: Install lint tools
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
          pip install yamllint

      - name: golangci-lint
        run: golangci-lint run --config .golangci.yml --timeout 5m ./cmd/... ./internal/...

      - name: yamllint
        run: |
          find . -name '*.yaml' -o -name '*.yml' \
            | grep -v node_modules | grep -v pnpm-lock | grep -v bazel- \
            | xargs yamllint --strict -c .yamllint.yaml

      - name: eslint
        run: pnpm --filter @devops-course/web lint
        working-directory: .

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - uses: pnpm/action-setup@v5

      - name: Install frontend deps
        run: pnpm install

      - name: Go tests
        run: go test -v -race -coverprofile=coverage.out ./internal/... ./cmd/...

      - name: Frontend tests
        run: pnpm --filter @devops-course/web test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - uses: pnpm/action-setup@v4

      - name: Install frontend deps
        run: pnpm install

      - name: Build Go backend
        run: go build -o bin/server ./cmd/server

      - name: Build Astro frontend
        run: pnpm --filter @devops-course/web build

  bazel:
    name: Bazel Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: bazel-contrib/setup-bazel@0.14.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Bazel build
        run: bazel build //... --config=ci

      - name: Bazel test
        run: bazel test //internal/... //cmd/... --config=ci

  image:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6

      - uses: bazel-contrib/setup-bazel@0.14.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-image
          repository-cache: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        run: |
          bazel run //cmd/server:push --config=ci \
            -- --tag "${{ github.sha }}" --tag "latest"
